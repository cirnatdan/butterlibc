name: Build Matrix

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        compiler: [ldc2, dmd]
        arch: [x86_64, aarch64]
        include:
          - compiler: ldc2
            dmd_binary: ldmd2
          - compiler: dmd
            dmd_binary: dmd
        
    steps:
    - uses: actions/checkout@v4
    
    - name: Install D compiler
      uses: dlang-community/setup-dlang@v1
      with:
        compiler: ${{ matrix.compiler }}
    
    - name: Install NetBSD bmake and cross-compilation tools
      run: |
        sudo apt-get update
        sudo apt-get install -y bmake gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu
    
    - name: Build for ${{ matrix.arch }} with ${{ matrix.compiler }}
      run: |
        if [ "${{ matrix.arch }}" = "aarch64" ]; then
          export ARCH=AArch64
          export AS=aarch64-linux-gnu-as
          export CC=aarch64-linux-gnu-gcc
          export LD=aarch64-linux-gnu-ld
        else
          export ARCH=X86_64
        fi
        
        export DMD=${{ matrix.dmd_binary }}
        bmake clean
        bmake default
    
    - name: Run tests
      run: |
        if [ "${{ matrix.arch }}" = "aarch64" ]; then
          export ARCH=AArch64
          export AS=aarch64-linux-gnu-as
          export CC=aarch64-linux-gnu-gcc
          export LD=aarch64-linux-gnu-ld
        else
          export ARCH=X86_64
        fi
        
        export DMD=${{ matrix.dmd_binary }}
        bmake test
    
    - name: Build shared library
      run: |
        if [ "${{ matrix.arch }}" = "aarch64" ]; then
          export ARCH=AArch64
          export AS=aarch64-linux-gnu-as
          export CC=aarch64-linux-gnu-gcc
          export LD=aarch64-linux-gnu-ld
        else
          export ARCH=X86_64
        fi
        
        export DMD=${{ matrix.dmd_binary }}
        bmake libbutterc.so
